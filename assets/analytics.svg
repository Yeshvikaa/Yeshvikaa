<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B4E" />
      <stop offset="70%" stop-color="#14112E" />
      <stop offset="100%" stop-color="#0B091A" />
    </linearGradient>
    <style>
      .card-title {
        font-family: 'Segoe UI', -apple-system, system-ui, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #C084FC;
        letter-spacing: 1px;
      }
      .stat-val {
        font-family: 'Segoe UI', -apple-system, system-ui, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 800;
        font-size: 26px;
        fill: #F3F4F6;
      }
      .stat-lbl {
        font-family: 'Segoe UI', -apple-system, system-ui, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 500;
        font-size: 13px;
        fill: #9CA3AF;
      }
      .lang-lbl {
        font-family: 'Segoe UI', -apple-system, system-ui, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 600;
        font-size: 13px;
        fill: #E5E7EB;
        dominant-baseline: middle;
      }
      .lang-percent {
        font-family: 'Segoe UI', -apple-system, system-ui, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 700;
        font-size: 13px;
        fill: #A78BFA;
        dominant-baseline: middle;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="360" rx="15" fill="url(#bg-grad)" stroke="#4C1D95" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Subtle grid -->
  <path d="M0,72 L800,72 M0,144 L800,144 M0,216 L800,216 M0,288 L800,288" stroke="#4F46E5" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ═══ LEFT: Stats Panel ═══ -->
  <text x="40" y="42" class="card-title">📊  GitHub Analytics</text>

  <!-- Repos box -->
  <rect x="40" y="62" width="305" height="74" rx="10" fill="#161334" fill-opacity="0.75" stroke="#7C3AED" stroke-opacity="0.18" stroke-width="1"/>
  <!-- folder icon -->
  <g transform="translate(62,79)" stroke="#A78BFA" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
  </g>
  <text x="102" y="101" class="stat-val">28</text>
  <text x="102" y="122" class="stat-lbl">Public Repositories</text>

  <!-- Stars box -->
  <rect x="40" y="150" width="305" height="74" rx="10" fill="#161334" fill-opacity="0.75" stroke="#7C3AED" stroke-opacity="0.18" stroke-width="1"/>
  <g transform="translate(62,167)" stroke="#FBBF24" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
  </g>
  <text x="102" y="189" class="stat-val">0</text>
  <text x="102" y="210" class="stat-lbl">Total Stars Received</text>

  <!-- Forks box -->
  <rect x="40" y="238" width="305" height="74" rx="10" fill="#161334" fill-opacity="0.75" stroke="#7C3AED" stroke-opacity="0.18" stroke-width="1"/>
  <g transform="translate(62,255)" stroke="#60A5FA" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/>
    <path d="M18 9v2a6 6 0 0 1-12 0V9M12 15V11"/>
  </g>
  <text x="102" y="277" class="stat-val">0</text>
  <text x="102" y="298" class="stat-lbl">Total Forks Created</text>

  <!-- ═══ Divider ═══ -->
  <line x1="385" y1="30" x2="385" y2="330" stroke="#4C1D95" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- ═══ RIGHT: Languages Panel ═══ -->
  <text x="410" y="42" class="card-title">⚡  Languages Distribution</text>

  <!-- Python  68.7% -->
  <text x="410" y="84" class="lang-lbl">Python</text>
  <text x="775" y="84" class="lang-percent" text-anchor="end">68.7%</text>
  <rect x="410" y="91" width="365" height="9" rx="4" fill="#1E293B"/>
  <rect x="410" y="91" width="251" height="9" rx="4" fill="#3776AB"/>

  <!-- JavaScript  13.2% -->
  <text x="410" y="124" class="lang-lbl">JavaScript</text>
  <text x="775" y="124" class="lang-percent" text-anchor="end">13.2%</text>
  <rect x="410" y="131" width="365" height="9" rx="4" fill="#1E293B"/>
  <rect x="410" y="131" width="48" height="9" rx="4" fill="#F7DF1E"/>

  <!-- Kotlin  7.2% -->
  <text x="410" y="164" class="lang-lbl">Kotlin</text>
  <text x="775" y="164" class="lang-percent" text-anchor="end">7.2%</text>
  <rect x="410" y="171" width="365" height="9" rx="4" fill="#1E293B"/>
  <rect x="410" y="171" width="26" height="9" rx="4" fill="#7F52FF"/>

  <!-- PHP  4.4% -->
  <text x="410" y="204" class="lang-lbl">PHP</text>
  <text x="775" y="204" class="lang-percent" text-anchor="end">4.4%</text>
  <rect x="410" y="211" width="365" height="9" rx="4" fill="#1E293B"/>
  <rect x="410" y="211" width="16" height="9" rx="4" fill="#777BB4"/>

  <!-- TypeScript  3.8% -->
  <text x="410" y="244" class="lang-lbl">TypeScript</text>
  <text x="775" y="244" class="lang-percent" text-anchor="end">3.8%</text>
  <rect x="410" y="251" width="365" height="9" rx="4" fill="#1E293B"/>
  <rect x="410" y="251" width="14" height="9" rx="4" fill="#3178C6"/>

  <!-- CSS  1.9% -->
  <text x="410" y="284" class="lang-lbl">CSS</text>
  <text x="775" y="284" class="lang-percent" text-anchor="end">1.9%</text>
  <rect x="410" y="291" width="365" height="9" rx="4" fill="#1E293B"/>
  <rect x="410" y="291" width="7" height="9" rx="4" fill="#563D7C"/>

</svg>
