name: 🚀 Auto-Update GitHub Profile

on:
  push:
    branches: [main]
  schedule:
    # Runs daily at 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force profile regeneration'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: profile-update
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Generate the README from GitHub API
  # ─────────────────────────────────────────────────────────
  generate-readme:
    name: 📝 Generate README.md
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 Generate README
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Yeshvikaa
        run: |
          python scripts/generate_readme.py

      - name: 🔍 Verify README was generated
        run: |
          if [ ! -f "README.md" ]; then
            echo "❌ README.md was not generated!"
            exit 1
          fi
          LINES=$(wc -l < README.md)
          echo "✅ README.md generated with ${LINES} lines"

      - name: 📊 README Stats
        run: |
          echo "### README Statistics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | $(wc -l < README.md) |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $(du -sh README.md | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Generated At | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY

      - name: 🚀 Commit and push README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add README.md
          
          if git diff --staged --quiet; then
            echo "✅ README.md is already up-to-date. No commit needed."
          else
            git commit -m "🤖 Auto-update: Sync profile README [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ README.md pushed to main branch!"
          fi

  # ─────────────────────────────────────────────────────────
  # JOB 2: Generate snake animation
  # ─────────────────────────────────────────────────────────
  generate-snake:
    name: 🐍 Generate Contribution Snake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 🐍 Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Yeshvikaa
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: 📤 Push snake SVGs
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
